<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-success mb-2"></div>
    <p class="fw-bold small text-muted">SINCRO SGETR...</p>
  </div>

  <div id="sidebar-overlay" onclick="ui.toggleSidebar()"></div>

  <button class="mobile-nav-toggle" onclick="ui.toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>

  <div class="sidebar" id="sidebar">
    <img src="https://www.appsheet.com/fsimage.png?appid=7c988a45-e8a7-41a8-a60f-a98a17682faa&datasource=google&filename=DocId%3D1ApQFz2LUMMhgjWOXTPDaG5h-Oxjceair&signature=9fe2486cbd960b0109cbb34df53ce016626c08b6a403881bb9ce51a4d3b791b3&tableprovider=google&userid=394309307" style="width:50px; display:block; margin: 0 auto 10px;">
    <div class="profile-box">
      <img id="uFoto" src="" class="profile-img mb-2 shadow-sm">
      <h6 id="uNombre" class="fw-bold mb-1 small text-truncate">Cargando...</h6>
      <span class="badge bg-warning text-dark" id="uNie" style="font-size: 0.7rem;">---</span>
    </div>
    <nav>
      <button class="nav-btn active" onclick="ui.showView('dashboard', this)">Inicio</button>
      <button class="nav-btn" onclick="ui.showView('perfil', this)">Mi Perfil</button>
      <button class="nav-btn" onclick="ui.abrirCarnet()">Mi Carnet</button>
    </nav>
    <div style="flex-grow: 1;"></div>
    <div class="bottom-section">
      <div id="adminArea" class="hidden mb-3">
        <p class="text-danger fw-bold mb-1" style="font-size: 0.65rem;">AUDITORÍA</p>
        <input type="text" id="nieSearch" class="form-control form-control-sm mb-2" placeholder="NIE">
        <button class="btn btn-sm btn-danger w-100 fw-bold" onclick="ui.auditar()">Consultar NIE</button>
      </div>
      <button class="btn btn-sm btn-light w-100 border fw-bold text-muted" onclick="ui.logout()">Cambiar Cuenta</button>
    </div>
  </div>

  <main class="main-content">
    <div id="view-dashboard">
      <h4 class="fw-bold mb-4" style="color: var(--sgetr-blue);">Panel Estudiantil</h4>
      <div class="grid-menu">
        <div class="card-stat card-faltas" onclick="ui.verHistorial('Falta')">
          <i class="fas fa-gavel text-danger me-3"></i> <b>Faltas</b>
        </div>
        <div class="card-stat card-demeritos" onclick="ui.verHistorial('Demérito')">
          <i class="fas fa-minus-circle text-warning me-3"></i> <b>Deméritos</b>
        </div>
        <div class="card-stat card-meritos" onclick="ui.verHistorial('Mérito')">
          <i class="fas fa-award text-success me-3"></i> <b>Méritos</b>
        </div>
        <div class="card-stat card-redenciones" onclick="ui.verHistorial('Redención')">
          <i class="fas fa-hands-helping text-primary me-3"></i> <b>Redenciones</b>
        </div>
      </div>
    </div>

    <div id="view-historial" class="hidden">
      <div class="d-flex justify-content-between mb-4 align-items-center">
        <h4 id="histTitulo" class="fw-bold m-0" style="color: var(--sgetr-blue);">---</h4>
        <button class="btn btn-sm btn-light border fw-bold" onclick="ui.showView('dashboard')">Volver</button>
      </div>
      <div id="histContent"></div>
    </div>

    <div id="view-perfil" class="hidden">
      <h4 class="fw-bold mb-4" style="color: var(--sgetr-blue);">Mi Perfil</h4>
      <div id="perfilGrid" class="row g-3"></div>
    </div>
  </main>

  <div class="modal fade" id="modalCarnet" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 bg-transparent align-items-center">
        <div id="carnetArea" style="width: 340px; height: 480px; background: white; border-radius: 20px; overflow: hidden; border: 1px solid #ddd; position: relative;">
          <div class="id-header" style="background: var(--sgetr-blue); padding: 30px 15px; text-align: center; color: white; border-bottom: 5px solid var(--sgetr-green);">
            <div class="fw-bold small">C.E. GENERAL TOMÁS REGALADO</div>
            <div style="font-size: 0.55rem; opacity: 0.8;">IDENTIFICACIÓN INSTITUCIONAL</div>
          </div>
          <div class="id-body text-center p-4">
            <div id="idNombre" style="font-size: 1.3rem; font-weight: 800; color: var(--sgetr-blue); text-transform: uppercase;">---</div>
            <p id="idNieTxt" class="text-muted fw-bold mb-4">NIE: ---</p>
            <div id="idGrado" class="bg-light p-2 rounded-3 fw-bold small text-uppercase mb-4">---</div>
            <img id="idQr" src="" style="width: 110px;" crossorigin="anonymous">
          </div>
          <div style="background: var(--sgetr-green); height: 10px; position: absolute; bottom: 0; width: 100%;"></div>
        </div>
        <button class="btn btn-success rounded-pill px-5 mt-4 fw-bold shadow-lg" onclick="ui.descargar()">DESCARGAR PNG</button>
        <button class="btn btn-light rounded-pill px-5 mt-2 text-muted fw-bold" data-bs-dismiss="modal">CERRAR</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
